<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户面板 - 物流信息管理系统</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 30px;
      cursor: zoom-out;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 95%;
      max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .lightbox-info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      color: #1f2937;
    }
    .lightbox-info b { color: #4f46e5; }
    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: #fff;
      cursor: pointer;
      line-height: 1;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="icon">📦</div>
      <span>物流信息管理系统</span>
    </div>
    <div class="navbar-user">
      <span class="role-badge user">用户</span>
      <span id="usernameDisplay" style="font-size:14px;color:#4b5563;"></span>
      <button class="btn btn-outline btn-sm" onclick="logout()">退出登录</button>
    </div>
  </nav>

  <div class="container">
    <!-- 提交信息表单 -->
    <h2 class="page-title">提交物流信息</h2>
    <div class="card">
      <div class="card-title">📝 填写信息</div>
      <form id="submitForm">
        <div class="info-grid">
          <div class="form-group">
            <label>手机号码</label>
            <input type="text" id="phone" placeholder="请输入11位手机号码" maxlength="11" required>
          </div>
          <div class="form-group">
            <label>物流单号</label>
            <input type="text" id="logisticsNumber" placeholder="请输入物流单号" required>
          </div>
          <div class="form-group">
            <label>商品数量</label>
            <input type="number" id="quantity" placeholder="请输入商品数量" min="1" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">提交信息</button>
      </form>
    </div>

    <!-- 我的提交记录 -->
    <h2 class="page-title" style="margin-top:32px;">我的提交记录</h2>
    <div id="submissionsList">
      <div class="empty-state">
        <div class="icon">📭</div>
        <p>暂无提交记录</p>
      </div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <h2>提交详情</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">关闭</button>
      </div>
    </div>
  </div>

  <!-- 图片灯箱 -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" src="" alt="大图">
    <div id="lightboxInfo" class="lightbox-info"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/js/user.js"></script>
</body>
</html>
